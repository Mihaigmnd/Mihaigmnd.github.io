<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro JSON Formatter</title>
    <style>
        :root {
            --bg: #0f172a;
            --panel: #1e293b;
            --text: #f8fafc;
            --primary: #38bdf8;
            --error: #ef4444;
            /* Syntax Colors */
            --key: #f472b6;
            --string: #4ade80;
            --number: #fbbf24;
            --boolean: #818cf8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        header { margin-bottom: 20px; }
        h1 { margin: 0; font-size: 1.5rem; color: var(--primary); }
        p { margin: 5px 0 0; opacity: 0.7; font-size: 0.9rem; }

        .main-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            flex-grow: 1;
            min-height: 0;
        }

        .panel {
            display: flex;
            flex-direction: column;
            background: var(--panel);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #334155;
        }

        textarea, #output {
            flex-grow: 1;
            padding: 15px;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.5;
            border: none;
            outline: none;
            resize: none;
            background: transparent;
            color: inherit;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        textarea { border-bottom: 1px solid #334155; }
        textarea::placeholder { color: #64748b; }

        .controls {
            padding: 10px 15px;
            background: #111827;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        button {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.9; }
        button.secondary { background: #475569; color: white; margin-left: 10px; }

        .error-msg {
            color: var(--error);
            font-size: 0.85rem;
            font-weight: bold;
            display: none;
        }

        /* Syntax Highlighting Classes */
        .json-key { color: var(--key); }
        .json-string { color: var(--string); }
        .json-number { color: var(--number); }
        .json-boolean { color: var(--boolean); }
        .json-null { color: var(--error); }

        @media (max-width: 768px) {
            .main-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <h1>Pro JSON Formatter & Validator</h1>
    <p>Paste your messy JSON on the left to clean it up.</p>
</header>

<div class="main-container">
    <div class="panel">
        <textarea id="input" placeholder="Paste raw JSON here..."></textarea>
        <div class="controls">
            <div id="error-display" class="error-msg"></div>
            <div>
                <button onclick="processJSON()">Format JSON</button>
            </div>
        </div>
    </div>

    <div class="panel">
        <pre id="output"></pre>
        <div class="controls">
            <span style="font-size: 0.8rem; opacity: 0.5;">Formatted Output</span>
            <button class="secondary" onclick="copyToClipboard()">Copy to Clipboard</button>
        </div>
    </div>
</div>

<script>
    function processJSON() {
        const input = document.getElementById('input').value;
        const outputElement = document.getElementById('output');
        const errorDisplay = document.getElementById('error-display');
        
        errorDisplay.style.display = 'none';
        outputElement.innerHTML = '';

        if (!input.trim()) return;

        try {
            // 1. Parse and Format
            const parsed = JSON.parse(input);
            const formatted = JSON.stringify(parsed, null, 4);
            
            // 2. Apply Syntax Highlighting
            outputElement.innerHTML = syntaxHighlight(formatted);
            
        } catch (e) {
            // 3. Smart Error Handling
            errorDisplay.style.display = 'block';
            errorDisplay.innerText = `Invalid JSON: ${e.message}`;
            outputElement.innerText = "Waiting for valid input...";
        }
    }

    function syntaxHighlight(json) {
        // Escape HTML to prevent XSS
        json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        
        // The regex finds keys, strings, numbers, booleans, and nulls
        return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function (match) {
            let cls = 'json-number';
            if (/^"/.test(match)) {
                if (/:$/.test(match)) {
                    cls = 'json-key';
                } else {
                    cls = 'json-string';
                }
            } else if (/true|false/.test(match)) {
                cls = 'json-boolean';
            } else if (/null/.test(match)) {
                cls = 'json-null';
            }
            return `<span class="${cls}">${match}</span>`;
        });
    }

    async function copyToClipboard() {
        const output = document.getElementById('output').innerText;
        if (!output || output === "Waiting for valid input...") return;
        
        try {
            await navigator.clipboard.writeText(output);
            alert('Copied to clipboard!');
        } catch (err) {
            alert('Failed to copy');
        }
    }

    // Optional: Auto-format as you type (debounced)
    let timeout = null;
    document.getElementById('input').addEventListener('input', () => {
        clearTimeout(timeout);
        timeout = setTimeout(processJSON, 500);
    });
</script>

</body>
</html>
